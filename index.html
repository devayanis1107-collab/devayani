<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
            box-shadow: 0px 0px 10px gray;
        }

        .login-box img {
            width: 100px;
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- Replace logo.png with your college logo -->
    <img src="logo.png" alt="College Logo">

    <h3>College Login</h3>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

</div>

</body>
</html>
